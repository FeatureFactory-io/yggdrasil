[behave]
# AT features live in features/at/, E2E in features/e2e/
paths = features
lang = en

# Tags
tags = ~@wip

# Output
format = progress2
# Uncomment for verbose step output:
# format = pretty

# behave-django integration
django_settings = yggdrasil.settings
use_existing_database = False

# JUnit XML for CI
junit = true
junit_directory = test-results/behave

# Stop on first failure in CI (override locally with --no-stop)
stop = false
