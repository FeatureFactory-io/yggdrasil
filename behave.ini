[behave]
# AT: single source of truth in docs/features/
# E2E: Playwright runner in tests/e2e/ (invoked via Makefile)
paths = docs/features
lang = en

# Tags
tags = ~@wip

# Output
format = progress2
# Uncomment for verbose step output:
# format = pretty
logging_level = INFO

# behave-django integration: settings module and DB isolation flags
# (--simple / --use-existing-database) are passed on the CLI via Makefile
# targets, since `manage.py behave` reads them as command-line options,
# not behave.ini keys.

# JUnit XML for CI
junit = true
junit_directory = test-results/behave

# Stop on first failure in CI (override locally with --no-stop)
stop = false
