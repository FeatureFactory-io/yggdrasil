    system_dependencies: []
    checkpoint:
      command: >
        DJANGO_SETTINGS_MODULE=yggdrasil.test_settings
        uv run python manage.py behave --simple --wip
        --include "auth-login.feature" docs/features/ 2>&1 | tail -5
      expected_exit_code: 0
    dependencies: []
    context_map:
      - "src/yggdrasil/auth/views.py:LoginView.get — render login form"
      - "mockups/views.py:auth_login — mockup reference implementation"
      - "src/yggdrasil/web/templates/mockups/auth/login.html — template with data-testid attrs"
      - "docs/features/steps/assertion_steps.py:step_element_visible — checks data-testid"
      - "docs/features/steps/http_steps.py:step_get_path — Django test client GET"
    do_not_do:
