      - "Do NOT add a repository/manager layer — service layer only (SAO.md §3)"
      - "Do NOT access ORM from views — call service methods"
      - "Do NOT add JavaScript or client-side rendering to the real login view"
      - "Do NOT bypass Django's CSRF middleware"
