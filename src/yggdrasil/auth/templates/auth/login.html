<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Yggdrasil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <!-- Font Awesome Pro (same kit as mimir) -->
  <script src="https://kit.fontawesome.com/600fa45ed9.js" crossorigin="anonymous"></script>
  <style>
    :root { --hg-primary: #1f3a5f; --hg-primary-700: #16294a; --hg-accent: #c9a227; --hg-border: #e3e7ee; }
    body {
      font-family: "Montserrat", system-ui, sans-serif;
      background: #f5f7fa; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .hg-login-card {
      background: #fff; border: 1px solid var(--hg-border); border-radius: 8px;
      padding: 2.5rem 2rem; width: 100%; max-width: 400px;
    }
    .accent { color: var(--hg-accent); font-size: 1.5rem; }
    .btn-primary { background: var(--hg-primary); border-color: var(--hg-primary); color: #fff; font-weight: 600; }
    .btn-primary:hover { background: var(--hg-primary-700); border-color: var(--hg-primary-700); color: #fff; }
    label { font-size: 0.82rem; font-weight: 600; color: #1a1f2e; }
  </style>
</head>
<body>
  <!-- Screen: AUTH-LOGIN-1 -->
  <div class="hg-login-card" data-testid="auth-login-page">
    <div class="text-center mb-4">
      <div class="mb-2">
        <i class="fa-solid fa-tree accent" aria-hidden="true"></i>
      </div>
      <h1 style="font-size:1.4rem;font-weight:700;color:#1a1f2e;margin:0;">Yggdrasil</h1>
      <p class="text-muted small mb-0">Architecture knowledge graph</p>
    </div>
    {% if error %}
    <div class="alert alert-warning mb-3" role="alert" data-testid="login-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="{% url 'auth:login' %}" data-testid="login-form" autocomplete="off">
      {% csrf_token %}
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email"
               placeholder="commander@featurefactory.io" autocomplete="email"
               data-testid="login-email" required value="{{ field_email|default:'' }}">
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password"
               autocomplete="current-password" data-testid="login-password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100" data-testid="login-submit">
        Sign in
      </button>
    </form>
    <div class="mt-3 text-center">
      <small class="text-muted">Accounts are admin-provisioned. Contact your administrator.</small>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
