<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>API Access — Yggdrasil</title>
</head>
<body>
  <!-- Screen: AUTH-TOKEN-1 -->
  <div data-testid="auth-token-page">
    <h1>API Access</h1>
    <button data-testid="generate-token-btn" type="button">Generate New Token</button>
    <table aria-label="API tokens">
      <thead>
        <tr>
          <th>Name</th>
          <th>Scope</th>
          <th>Created</th>
          <th>Last used</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {% for token in tokens %}
        <tr data-testid="token-row-{{ token.pk }}">
          <td>{{ token.name }}</td>
          <td>{{ token.scope }}</td>
          <td>{{ token.created_at|date:"Y-m-d" }}</td>
          <td>{{ token.last_used_at|date:"Y-m-d"|default:"Never" }}</td>
          <td>
            <form method="post" action="{% url 'auth:token_revoke' token.pk %}">
              {% csrf_token %}
              <button type="submit" data-testid="revoke-token-{{ token.pk }}">Revoke</button>
            </form>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="5">No tokens yet.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
