<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yggdrasil</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117; color: #e6edf3;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      text-align: center; padding: 3rem 4rem;
      border: 1px solid #30363d; border-radius: 12px; background: #161b22;
      max-width: 520px;
    }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: .5rem; }
    p  { color: #8b949e; margin-bottom: 1.5rem; line-height: 1.6; }
    .badge {
      display: inline-block; padding: .25rem .75rem;
      border: 1px solid #388bfd; border-radius: 20px;
      color: #388bfd; font-size: .85rem; font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Yggdrasil</h1>
    <p>AI-augmented architecture knowledge-graph platform.<br>
       The tree that connects all worlds.</p>
    <span class="badge">Bootstrap OK</span>
  </div>
</body>
</html>
