<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Elements — Mockup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!-- Screen: ELEMENT-LIST+FIND-1 -->
<div class="container mt-4" data-testid="element-list-find-page">
  <div data-testid="element-list-find-loaded" style="display:none;">ELEMENT-LIST+FIND-1</div>
  <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item">Home</li><li class="breadcrumb-item active">Elements</li></ol></nav>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Elements <span class="badge bg-secondary">2</span></h1>
    <button class="btn btn-primary" data-testid="create-element-btn">Create Element</button>
  </div>
  <div class="row mb-3">
    <div class="col-md-6"><input class="form-control" placeholder="Find elements…" data-testid="search-input"></div>
    <div class="col-md-3"><select class="form-select" data-testid="stereotype-filter"><option>All Stereotypes</option><option>Application</option></select></div>
  </div>
  <table class="table table-hover" data-testid="elements-table">
    <thead><tr><th>Name</th><th>Stereotype</th><th>Package</th><th>Health</th><th>Actions</th></tr></thead>
    <tbody>
      <tr data-testid="row-payment-api"><td>Payment API</td><td>Application</td><td>Technology View</td><td><span class="badge bg-success">good</span></td><td><a href="view.html">View</a></td></tr>
      <tr data-testid="row-order-service"><td>Order Service</td><td>Application</td><td>Technology View</td><td><span class="badge bg-warning text-dark">warn</span></td><td><a href="view.html">View</a></td></tr>
    </tbody>
  </table>
  <div class="alert alert-light border mt-4 small"><strong>Mockup screens:</strong> <a href="list.html">List</a> · <a href="view.html">View</a></div>
</div>
<script>document.addEventListener('DOMContentLoaded',()=>console.log('[mockup:element-list-find] loaded'));</script>
</body>
</html>
