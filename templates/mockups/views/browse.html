<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Browser — Mockup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!-- Screen: VIEW-BROWSE-1 -->
<div class="container-fluid mt-3" data-testid="view-browse-page">
  <div data-testid="view-browse-loaded" style="display:none;">VIEW-BROWSE-1</div>
  <h1>View Browser</h1>
  <div class="row">
    <div class="col-md-3 border-end">
      <h6>Filters</h6>
      <select class="form-select mb-2" data-testid="package-filter"><option>Business View</option></select>
      <select class="form-select mb-2" data-testid="stereotype-filter"><option>Capability</option></select>
      <button class="btn btn-primary w-100" data-testid="apply-filters">Apply Filters</button>
    </div>
    <div class="col-md-6">
      <div class="btn-group mb-2"><button class="btn btn-outline-primary active" data-testid="table-toggle">Table</button><button class="btn btn-outline-primary" data-testid="graph-toggle">Graph</button></div>
      <div id="graph-canvas" class="border bg-light" style="min-height:400px" data-testid="graph-canvas">Cytoscape canvas placeholder</div>
    </div>
    <div class="col-md-3 border-start"><h6>Detail</h6><p class="text-muted">Select an element</p></div>
  </div>
</div>
<script>document.addEventListener('DOMContentLoaded',()=>console.log('[mockup:view-browse] loaded'));</script>
</body>
</html>
