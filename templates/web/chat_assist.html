{% extends "base.html" %}
{% block content %}
<!-- Screen: CHAT-ASSIST-1 -->
<h1>AI Chat</h1>
<div class="border rounded p-3 mb-3" style="min-height:200px" data-testid="chat-thread">
  <p class="text-muted">Ask about your architecture — answers grounded in the live graph via API/MCP.</p>
</div>
<form data-testid="chat-form">
  <textarea class="form-control mb-2" placeholder="Who owns Payment API?" data-testid="chat-input"></textarea>
  <button type="button" class="btn btn-primary" data-testid="chat-send">Send</button>
</form>
{% endblock %}
