# Source of truth for ACT-1-DISC-01 and ACT-1-LLM-03 bootstrap assertions.
minimum:
  - name: Payment API
    stereotype: container
    package: technology
    source_paths:
      - README.md
      - src/payment_api/app.py
  - name: Order Service
    stereotype: container
    package: technology
    source_paths:
      - README.md
      - src/order_service/app.py
  - name: Order Domain
    stereotype: component
    package: application
    source_paths:
      - README.md
      - src/order_domain/service.py
  - name: Billing Worker
    stereotype: component
    package: application
    source_paths:
      - README.md
      - src/billing_worker/worker.py

relationships:
  minimum:
    - source: Order Domain
      target: Order Service
      stereotype: depends_on
    - source: Billing Worker
      target: Order Domain
      stereotype: depends_on
    - source: Order Service
      target: Payment API
      stereotype: depends_on
